<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة المافيا المطورة</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 40px 20px 20px; }
        .container { max-width: 600px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button { background: #e50914; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; margin: 5px; }
        button:hover { background: #b20710; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin-bottom: 10px; width: 80%; text-align: center; }
        .box { background: #333; padding: 15px; margin: 15px 0; border-radius: 5px; border-left: 5px solid #e50914; }
        .hidden { display: none; }
        .chat-box { background: #111; height: 150px; overflow-y: auto; padding: 10px; text-align: right; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🕵️‍♂️ لعبة المافيا والغموض</h1>
    <hr>

    <div id="setup-screen">
        <button onclick="beHost()">الدخول كـ منصة التحكم (HOST)</button>
        <br><br>
        <h3>أو الدخول كلاعب وحجز مقعد:</h3>
        <input type="text" id="player-name-input" placeholder="اكتب اسمك هنا...">
        <br>
        <button onclick="bePlayer()">تأكيد حجز المقعد</button> 
    </div>

    <div id="host-panel" class="hidden">
        <h2>🎛️ لوحة تحكم الهوست</h2>
        <button onclick="socket.emit('distributeRoles')">توزيع الأدوار وبدء اللعبة</button>
        <div style="margin-top: 15px;">
            <button onclick="socket.emit('startNight')" style="background: #2c3e50;">🌙 ليل (تفعيل الأدوار)</button>
            <button onclick="socket.emit('startDay')" style="background: #f39c12;">☀️ صباح (إيقاف الأدوار والملخص)</button>
            <button onclick="socket.emit('revealVotes')" style="background: #27ae60;">📊 كشف نتائج التصويت</button>
        </div>
    </div>

    <div id="player-panel" class="hidden">
        <h2 id="welcome-msg">أهلاً بك</h2>
        <div id="role-box" class="box">بانتظار توزيع الأدوار من الهوست...</div>
    </div>

    <div id="summary-box" class="box hidden" style="background: #6f1d1d;">
        <h3 id="summary-text"></h3>
    </div>

    <div id="voting-section" class="box hidden">
        <h3>🗳️ ساحة التصويت النهارية (صوت على المتهم):</h3>
        <div id="voting-candidates"></div>
    </div>

    <div id="mafia-chat-section" class="box hidden" style="border-left: 5px solid #8e44ad;">
        <h3>💬 شات المافيا والشركاء السري</h3>
        <p style="font-size: 12px; color: #aaa;">أعضاء المافيا المعروفين: <span id="mafia-members-list"></span></p>
        <div id="mafia-chat-messages" class="chat-box"></div>
        <input type="text" id="mafia-msg-input" placeholder="اكتب رسالة سرية..." style="width: 70%; margin-top:5px;">
        <button onclick="sendMafiaMsg()" style="padding: 5px 10px;">إرسال</button>
    </div>

    <div class="box">
        <h3>👥 اللاعبين في اللوبي الحالي:</h3>
        <ul id="players-list" style="list-style: none; padding: 0;"></ul>
    </div>
</div>

<script>
    // لقط رابط السيرفر الحالي أوتوماتيكياً أينما تم رفعه
    const socket = io(window.location.origin); 
    let myInfo = null;
    let myRole = null;
    let isSpyWithAccess = false;

    function beHost() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('host-panel').classList.remove('hidden');
        socket.emit('registerHost');
    }

    function bePlayer() {
        const name = document.getElementById('player-name-input').value;
        if(name.trim() === "") {
            alert("الرجاء كتابة اسمك أولاً!");
            return;
        }
        socket.emit('joinGame', name);
    }

    socket.on('playerRegistered', (playerData) => {
        myInfo = playerData;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('player-panel').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = `اللاعب: ${playerData.name} 🎖️`;
    });

    socket.on('yourRole', (role) => {
        myRole = role;
        document.getElementById('role-box').innerText = `دورك السري هو: [ ${role} ]`;
        if(role === 'Mafia') {
            document.getElementById('mafia-chat-section').classList.remove('hidden');
        }
    });

    socket.on('updatePlayers', (players) => {
        const list = document.getElementById('players-list');
        list.innerHTML = '';
        
        const voteArea = document.getElementById('voting-candidates');
        voteArea.innerHTML = '';

        players.forEach(p => {
            const li = document.createElement('li');
            const voteStatus = p.votedFor ? `(صوّت 🛑)` : ``;
            li.innerText = `${p.name} - ${p.isAlive ? '❤️ حي' : '💀 ميت'} ${voteStatus}`;
            list.appendChild(li);

            if (myInfo && myInfo.isAlive && p.isAlive && p.id !== myInfo.id) {
                const btn = document.createElement('button');
                btn.innerText = `تصويت ضد ${p.name}`;
                btn.style.background = '#d35400';
                btn.onclick = () => socket.emit('castVote', p.id);
                voteArea.appendChild(btn);
            }
        });
    });

    socket.on('gameStateChanged', ({ phase, nightSummary }) => {
        if (nightSummary) {
            document.getElementById('summary-box').classList.remove('hidden');
            document.getElementById('summary-text').innerText = nightSummary;
        } else {
            document.getElementById('summary-box').classList.add('hidden');
        }

        if (phase === 'DAY') {
            document.getElementById('voting-section').classList.remove('hidden');
        } else {
            document.getElementById('voting-section').classList.add('hidden');
        }

        if (phase === 'NIGHT' && myInfo && myInfo.isAlive) {
            alert("بدأ الليل! استخدم ميزة دورك السري الآن.");
        }
    });

    socket.on('spyDiscoveredMafia', (success) => {
        if (success) {
            alert("🚨 نجحت! كشفت أحد أعضاء المافيا وتم ضمك لشاتهم السري!");
            isSpyWithAccess = true;
            document.getElementById('mafia-chat-section').classList.remove('hidden');
        } else {
            alert("🔍 هذا الشخص ليس من المافيا.");
        }
    });

    socket.on('mafiaListUpdate', (list) => {
        document.getElementById('mafia-members-list').innerText = list.join(', ');
    });

    function sendMafiaMsg() {
        const input = document.getElementById('mafia-msg-input');
        if(input.value.trim() !== "") {
            socket.emit('sendMafiaMessage', input.value);
            input.value = '';
        }
    }

    socket.on('receiveMafiaMessage', ({ sender, text }) => {
        const box = document.getElementById('mafia-chat-messages');
        box.innerHTML += `<div><b>${sender}:</b> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    });

    socket.on('errorMsg', (msg) => alert(msg));
</script>
</body>
</html>
